name: evaluate-agent-event

on:
  workflow_dispatch:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Evaluate normalized event
        id: guard
        uses: ./
        with:
          rules: presets/baseline.yml
          input: examples/dangerous-command.json
          fail_on_warn: false

      - name: Print decision
        run: |
          echo "decision=${{ steps.guard.outputs.decision }}"
          echo "summary=${{ steps.guard.outputs.summary }}"
